name = "ironmind-worker"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# ─── Durable Objects ──────────────────────────────────────────────────────────
[[durable_objects.bindings]]
name = "ATHLETE_DO"
class_name = "AthleteObject"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["AthleteObject"]

# ─── R2 Buckets ───────────────────────────────────────────────────────────────
[[r2_buckets]]
binding = "AUDIO_CACHE"
bucket_name = "ironmind-audio-cache"

# ─── Environment Variables (non-secret) ───────────────────────────────────────
[vars]
ENVIRONMENT = "development"
# Claude model used for all AI calls
CLAUDE_MODEL = "claude-sonnet-4-6"
# ElevenLabs model for TTS
ELEVENLABS_TTS_MODEL = "eleven_turbo_v2"

# ─── Secrets (set via `wrangler secret put`) ──────────────────────────────────
# ANTHROPIC_API_KEY
# CF_AI_GATEWAY_URL
# ELEVENLABS_API_KEY
# ELEVENLABS_FALLBACK_VOICE_ID

# ─── Production Environment ───────────────────────────────────────────────────
[env.production]
name = "ironmind-worker"

[env.production.vars]
ENVIRONMENT = "production"
